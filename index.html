<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Anniversary Days</title>
<meta name="description" content="A cinematic journey through our story, counted from 2024.9.21.">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&family=Noto+Serif+SC:wght@200;300;400;500;700&display=swap" rel="stylesheet">

<!-- GSAP + ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

</head>
<body>

  <!-- Cinematic Loader -->
  <div class="cinematic-loader" id="loader">
    <div class="cinematic-loader-dot"></div>
  </div>

  <!-- Cursor Glow -->
  <div class="cursor-glow" aria-hidden="true"></div>

  <!-- Ambient Particles -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- Scroll Progress: dots populated dynamically by scroll.js -->
  <nav class="scroll-progress" id="scroll-progress-nav" aria-label="Section navigation"></nav>

  <!-- Audio Toggle -->
  <button class="audio-toggle" aria-label="Toggle background music">
    <span class="audio-icon">♪</span>
  </button>

  <!-- HERO: Opening Cinematic -->
  <section id="hero" class="hero-section">
    <div class="hero-bg">
      <div class="hero-bg-gradient"></div>
      <div class="hero-stars"></div>
    </div>

    <div class="hero-content">
      <p class="hero-subtitle reveal-text">A Story of Two People</p>

      <div class="hero-title reveal-blur">
        <p class="display-lg" style="color: var(--cinema-white-dim); font-weight: 200;">
          我们的纪念日
        </p>
      </div>

      <div class="hero-number-container" style="margin-top: 1rem;">
        <span class="hero-number">--</span>
        <span class="hero-number-label">天</span>
      </div>
    </div>

    <div class="hero-scroll-indicator">
      <div class="hero-scroll-line"></div>
      <span class="hero-scroll-text">Scroll to begin</span>
    </div>
  </section>

  <!-- DATA-DRIVEN CHAPTERS: rendered by renderer.js -->
  <div id="chapters-container">
    <!-- Chapters and ending are generated from data/chapters.json, data/photos.json, and data/memories.json -->
  </div>

  <script type="module" src="/src/main.ts"></script>

</body>
</html>
